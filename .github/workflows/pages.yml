name: Deploy TGPL website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site
        run: |
          set -euo pipefail
          mkdir -p _site
          cat site-parts/index-* | base64 --decode > _site/index.html
          cp -R assets _site/assets
          cp _site/index.html _site/404.html
          touch _site/.nojekyll
          test -s _site/index.html
          test -f _site/assets/brand/tgpl-logo-full.webp
          test -f _site/assets/clients/chakor-ventures.webp
          test -f _site/assets/clients/marriott-international.webp

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
